# Railway configuration
# This file configures the API service deployment on Railway

[build]
builder = "dockerfile"

[deploy]
startCommand = "bunx drizzle-kit migrate && bun src/index.ts"
healthcheckPath = "/auth/verify"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Note: Add PostgreSQL database via Railway UI
# Then set DATABASE_URL in Variables as: ${{Postgres.DATABASE_URL}}
